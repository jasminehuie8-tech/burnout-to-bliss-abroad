backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  # ===== GLOBAL SITE SETTINGS =====
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Global Settings (Email, Links, Social)"
        name: "site"
        file: "_data/site.json"
        fields:
          - label: "Contact Email"
            name: "contact_email"
            widget: "string"
            hint: "Main contact email shown on the site"
          - label: "30-Min Clarity Call Link (Calendly)"
            name: "calendly_clarity_call"
            widget: "string"
            hint: "Free 30-minute call booking link"
          - label: "Done-For-You Call Link (Calendly)"
            name: "calendly_dfy_call"
            widget: "string"
            hint: "60-minute DFY strategy call booking link"
          - label: "Instagram URL"
            name: "instagram_url"
            widget: "string"
          - label: "YouTube URL"
            name: "youtube_url"
            widget: "string"
          - label: "Skool Community URL"
            name: "skool_url"
            widget: "string"
          - label: "Footer Tagline"
            name: "footer_tagline"
            widget: "string"
            hint: "Short tagline shown at the bottom of every page"

  # ===== HOME PAGE =====
  - name: "home"
    label: "Home Page"
    files:
      - label: "Home Page Content"
        name: "home"
        file: "_data/home.json"
        fields:
          - label: "Hero Headline"
            name: "hero_headline"
            widget: "string"
            hint: "Main headline at the top of the page"
          - label: "Hero Subheadline"
            name: "hero_subheadline"
            widget: "text"
            hint: "Paragraph under the main headline"
          - label: "Stat 1 — Number"
            name: "stat_1_number"
            widget: "string"
            hint: "e.g. 500+"
          - label: "Stat 1 — Label"
            name: "stat_1_label"
            widget: "string"
          - label: "Stat 2 — Number"
            name: "stat_2_number"
            widget: "string"
          - label: "Stat 2 — Label"
            name: "stat_2_label"
            widget: "string"
          - label: "Stat 3 — Number"
            name: "stat_3_number"
            widget: "string"
          - label: "Stat 3 — Label"
            name: "stat_3_label"
            widget: "string"
          - label: "Free Community — Description"
            name: "free_community_description"
            widget: "text"
          - label: "Courses — Price"
            name: "courses_price"
            widget: "string"
            hint: "e.g. $27+"
          - label: "Courses — Description"
            name: "courses_description"
            widget: "text"
          - label: "Done-For-You — Price"
            name: "dfy_price"
            widget: "string"
            hint: "e.g. $3,997"
          - label: "Done-For-You — Description"
            name: "dfy_description"
            widget: "text"

  # ===== ABOUT PAGE =====
  - name: "about"
    label: "About Page"
    files:
      - label: "About Page Content"
        name: "about"
        file: "_data/about.json"
        fields:
          - label: "Coleen — Headline"
            name: "coleen_headline"
            widget: "string"
          - label: "Coleen — Intro Line"
            name: "coleen_intro"
            widget: "text"
          - label: "Coleen — Full Bio"
            name: "coleen_bio"
            widget: "text"
          - label: "Credential 1"
            name: "coleen_credential_1"
            widget: "string"
          - label: "Credential 2"
            name: "coleen_credential_2"
            widget: "string"
          - label: "Credential 3"
            name: "coleen_credential_3"
            widget: "string"
          - label: "Credential 4"
            name: "coleen_credential_4"
            widget: "string"
          - label: "Ricardo — Headline"
            name: "ricardo_headline"
            widget: "string"
          - label: "Ricardo — Role"
            name: "ricardo_role"
            widget: "string"
          - label: "Ricardo — Bio"
            name: "ricardo_bio"
            widget: "text"
          - label: "Lifestyle Section — Headline"
            name: "lifestyle_headline"
            widget: "string"
          - label: "Lifestyle Section — Text"
            name: "lifestyle_text"
            widget: "text"

  # ===== WORK WITH ME PAGE =====
  - name: "work_with_me"
    label: "Work With Me Page"
    files:
      - label: "Work With Me Content"
        name: "work_with_me"
        file: "_data/work-with-me.json"
        fields:
          - label: "Page Headline"
            name: "page_headline"
            widget: "string"
          - label: "Page Subheadline"
            name: "page_subheadline"
            widget: "text"
          - label: "Free Community — Description"
            name: "free_community_description"
            widget: "text"
          - label: "Courses — Price"
            name: "courses_price"
            widget: "string"
          - label: "Courses — Description"
            name: "courses_description"
            widget: "text"
          - label: "Done-For-You — Headline"
            name: "dfy_headline"
            widget: "string"
          - label: "Done-For-You — Price"
            name: "dfy_price"
            widget: "string"
          - label: "Done-For-You — Description"
            name: "dfy_description"
            widget: "text"
          - label: "DFY Feature 1"
            name: "dfy_feature_1"
            widget: "string"
          - label: "DFY Feature 2"
            name: "dfy_feature_2"
            widget: "string"
          - label: "DFY Feature 3"
            name: "dfy_feature_3"
            widget: "string"
          - label: "DFY Feature 4"
            name: "dfy_feature_4"
            widget: "string"
          - label: "DFY Feature 5"
            name: "dfy_feature_5"
            widget: "string"
          - label: "DFY Feature 6"
            name: "dfy_feature_6"
            widget: "string"
          - label: "Clarity Call — Description"
            name: "clarity_call_description"
            widget: "text"

  # ===== TESTIMONIALS =====
  - name: "testimonials"
    label: "Testimonials"
    files:
      - label: "Client Testimonials"
        name: "testimonials"
        file: "_data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - label: "Client Name"
                name: "name"
                widget: "string"
              - label: "Role (e.g. Registered Nurse)"
                name: "role"
                widget: "string"
              - label: "Location (e.g. Texas)"
                name: "location"
                widget: "string"
                required: false
              - label: "Quote"
                name: "quote"
                widget: "text"
                hint: "Do not include quotation marks — they are added automatically"
              - label: "Photo"
                name: "photo"
                widget: "image"
                required: false

  # ===== FAQ =====
  - name: "faq"
    label: "FAQ"
    files:
      - label: "Frequently Asked Questions"
        name: "faq"
        file: "_data/faq.json"
        fields:
          - label: "FAQ Items"
            name: "faqs"
            widget: "list"
            fields:
              - label: "Question"
                name: "question"
                widget: "string"
              - label: "Answer"
                name: "answer"
                widget: "text"

  # ===== BLOG POSTS =====
  - name: "blog"
    label: "Blog Posts"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
      - label: "Featured Image"
        name: "thumbnail"
        widget: "image"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"

  # ===== IMAGES / MEDIA =====
  - name: "media"
    label: "Images"
    files:
      - label: "Site Images"
        name: "images"
        file: "_data/site.json"
        fields:
          - label: "Note"
            name: "contact_email"
            widget: "string"
            hint: "To swap images, click the Media button in the top left of this admin panel. You can upload new photos there."
